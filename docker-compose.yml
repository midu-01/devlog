services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devlog
      POSTGRES_PASSWORD: devlog
      POSTGRES_DB: devlog
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlog -d devlog"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      # Inside the compose network the DB host is the service name, not localhost
      DATABASE_URL: postgresql://devlog:devlog@postgres:5432/devlog
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
